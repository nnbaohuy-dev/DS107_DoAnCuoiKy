<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Bean Quality Ranking</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay" id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Waking up the AI model (this may take a minute)...</p>
    </div>

    <header>
        <div class="header-container">
            <h1>Coffee Bean Quality Ranking</h1>
            <p>Upload an image to detect and classify coffee bean quality.</p>
        </div>
    </header>

    <main>
        <section class="upload-section">
            <div class="upload-container" id="drop-zone">
                <input type="file" id="file-input" accept="image/*" hidden>
                <div class="upload-content">
                    <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <h3>Drag & Drop an image here</h3>
                    <p>or</p>
                    <button class="btn" id="browse-btn">Browse Files</button>
                </div>
            </div>
            
            <div class="preview-container" id="preview-container" style="display: none;">
                <img id="image-preview" alt="Image preview">
                <button class="btn btn-primary" id="analyze-btn">Analyze Quality</button>
                <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
            </div>
        </section>

        <section class="result-section" id="result-section" style="display: none;">
            <h2>Analysis Results</h2>
            <div class="result-stats" id="result-stats"></div>
            <div class="result-image-container">
                <img id="result-image" alt="Analyzed coffee beans">
            </div>
            <button class="btn" id="new-analysis-btn">New Analysis</button>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
